# End-to-End AutoML (H2O + MLflow + FastAPI + Streamlit)
# Project 3: Credit Card Fraud Detection

services:
  h2o:
    build: ./backend
    image: e2e-automl-backend:latest
    command:
      - python
      - -c
      - >-
        import os,socket;
        ip=socket.gethostbyname(socket.gethostname());
        os.execvp('java',['java','-jar','/usr/local/lib/python3.11/site-packages/h2o/backend/bin/h2o.jar','-ip',ip,'-port','54321','-name','fraud-h2o','-allow_unsupported_java'])
    ports:
      - "${H2O_BIND_ADDRESS:-127.0.0.1}:54321:54321"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,urllib.request; urllib.request.urlopen(f'http://{socket.gethostbyname(socket.gethostname())}:54321/3/Cloud')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - project_network

  mlflow:
    build: ./backend
    image: e2e-automl-backend:latest
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: mlflow,localhost,127.0.0.1,backend,trainer
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "${MLFLOW_BIND_ADDRESS:-127.0.0.1}:5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - project_network

  trainer:
    build: ./backend
    image: e2e-automl-backend:latest
    command: ["python", "train.py", "--config", "configs/baseline.yaml"]
    environment:
      MLFLOW_TRACKING_URI: ${INTERNAL_MLFLOW_TRACKING_URI:-http://mlflow:5000}
      INTERNAL_H2O_URL: ${INTERNAL_H2O_URL:-http://h2o:54321}
      MODEL_NAME: fraud-detection-automl
      MODEL_ALIAS: champion
      MODEL_ARTIFACT_DIR: /app/model_artifacts
    volumes:
      - model_artifacts:/app/model_artifacts
      - ./backend/data:/app/data:ro
    depends_on:
      mlflow:
        condition: service_healthy
      h2o:
        condition: service_healthy
    restart: "no"
    networks:
      - project_network

  backend:
    build: ./backend
    image: e2e-automl-backend:latest
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      MLFLOW_TRACKING_URI: ${INTERNAL_MLFLOW_TRACKING_URI:-http://mlflow:5000}
      INTERNAL_H2O_URL: ${INTERNAL_H2O_URL:-http://h2o:54321}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8501,http://127.0.0.1:8501}
      MODEL_NAME: fraud-detection-automl
      MODEL_ALIAS: champion
      MODEL_ARTIFACT_DIR: /app/model_artifacts
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:8000:8000"
    volumes:
      - model_artifacts:/app/model_artifacts
    depends_on:
      mlflow:
        condition: service_healthy
      h2o:
        condition: service_healthy
      trainer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - project_network

  frontend:
    build: ./frontend
    image: e2e-automl-frontend:latest
    environment:
      BACKEND_URL: ${INTERNAL_API_URL:-http://backend:8000}/predict
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - project_network

volumes:
  mlflow_data:
  model_artifacts:

networks:
  project_network:
