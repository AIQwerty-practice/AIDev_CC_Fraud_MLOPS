events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream landing_upstream { server landing:80; }
    upstream streamlit_upstream { server frontend:8501; }
    upstream api_upstream { server backend:8000; }
    upstream mlflow_upstream { server mlflow:5000; }
    upstream h2o_upstream { server h2o:54321; }

    server {
        listen 80;
        server_name fraud.barbaraplascencia.com app.barbaraplascencia.com
                    api.barbaraplascencia.com mlflow.barbaraplascencia.com
                    h2o.barbaraplascencia.com;
        return 301 https://$host$request_uri;
    }

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_certificate /etc/letsencrypt/live/fraud.barbaraplascencia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fraud.barbaraplascencia.com/privkey.pem;

    server {
        listen 443 ssl;
        http2 on;
        server_name fraud.barbaraplascencia.com;
        location / { proxy_pass http://landing_upstream; include /etc/nginx/proxy_params; }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name app.barbaraplascencia.com;
        location / {
            proxy_pass http://streamlit_upstream;
            include /etc/nginx/proxy_params;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 86400;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name api.barbaraplascencia.com;
        client_max_body_size 25m;
        location / {
            proxy_pass http://api_upstream;
            include /etc/nginx/proxy_params;
            proxy_read_timeout 300;
            proxy_send_timeout 300;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name mlflow.barbaraplascencia.com;
        client_max_body_size 100m;
        location / {
            proxy_pass http://mlflow_upstream;
            include /etc/nginx/proxy_params;
            proxy_request_buffering off;
            proxy_read_timeout 300;
            proxy_send_timeout 300;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name h2o.barbaraplascencia.com;
        location / {
            proxy_pass http://h2o_upstream;
            include /etc/nginx/proxy_params;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 300;
            proxy_send_timeout 300;
        }
    }
}
